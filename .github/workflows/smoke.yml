name: Smoke

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check installer syntax
        run: bash -n install.sh
      - name: Check version pointer
        run: test "$(cat VERSION)" = "$(cat releases/latest/VERSION)"
