name: Bug report
description: Report an installer, release, or public CLI issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, private source code, or session transcripts.
  - type: input
    id: version
    attributes:
      label: Vixy version
      description: Output from `vixy version`
      placeholder: "Vixy CLI v0.1.0-beta.1 (Jolly Roger)"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS arm64
        - macOS amd64
        - Linux arm64
        - Linux amd64
        - Windows arm64
        - Windows amd64
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact commands or UI actions.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
